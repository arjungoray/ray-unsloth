ray:
  address: null
  namespace: ray-unsloth
  ignore_reinit_error: true

model:
  config: qwen3.5-9b-instruct

lora:
  rank: 8
  alpha: 8
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  random_state: 3407
  use_rslora: false
  bias: none
  use_gradient_checkpointing: unsloth
  loftq_config: null

model_configs:
  gemma4-e2b-it:
    model:
      base_model: unsloth/gemma-4-E2B-it
      max_seq_length: 8192
      dtype: bfloat16
      load_in_4bit: true
      fast_inference: false
      gpu_memory_utilization: 0.85
      trust_remote_code: false
    lora:
      rank: 8
      alpha: 8
      dropout: 0.0
      target_modules:
        - q_proj
        - k_proj
        - v_proj
        - o_proj
        - gate_proj
        - up_proj
        - down_proj
      random_state: 3407
      use_rslora: false
      bias: none
      use_gradient_checkpointing: unsloth
      loftq_config: null
  lfm2.5-1.2b-instruct:
    model:
      base_model: LiquidAI/LFM2.5-1.2B-Instruct
      max_seq_length: 4096
      dtype: bfloat16
      load_in_4bit: false
      fast_inference: false
      gpu_memory_utilization: 0.85
      trust_remote_code: true
    lora:
      rank: 16
      alpha: 16
      dropout: 0.0
      target_modules:
        - q_proj
        - k_proj
        - v_proj
        - out_proj
        - in_proj
        - w1
        - w2
        - w3
      random_state: 3407
      use_rslora: false
      bias: none
      use_gradient_checkpointing: unsloth
      loftq_config: null
  qwen3.5-4b:
    model:
      base_model: Qwen/Qwen3.5-4B
      max_seq_length: 2048
      dtype: bfloat16
      load_in_4bit: false
      fast_inference: false
      gpu_memory_utilization: 0.85
      trust_remote_code: true
    lora:
      rank: 16
      alpha: 16
      dropout: 0.0
      target_modules:
        - q_proj
        - k_proj
        - v_proj
        - o_proj
        - gate_proj
        - up_proj
        - down_proj
      random_state: 3407
      use_rslora: false
      bias: none
      use_gradient_checkpointing: unsloth
      loftq_config: null
  qwen3.5-9b-instruct:
    model:
      base_model: unsloth/Qwen3.5-9B
      max_seq_length: 2048
      dtype: bfloat16
      load_in_4bit: false
      fast_inference: false
      gpu_memory_utilization: 0.85
      trust_remote_code: true
      device_map: auto
    lora:
      rank: 16
      alpha: 16
      dropout: 0.0
      target_modules:
        - q_proj
        - k_proj
        - v_proj
        - o_proj
        - gate_proj
        - up_proj
        - down_proj
      random_state: 3407
      use_rslora: false
      bias: none
      use_gradient_checkpointing: unsloth
      loftq_config: null

resources:
  trainer_num_gpus: 0.0
  trainer_num_cpus: 0.25
  sampler_num_gpus: 0.0
  sampler_num_cpus: 0.25
  sampler_replicas: 1
  placement_strategy: PACK

distributed:
  enabled: false
  mode: null
  num_nodes: 1
  gpus_per_node: 1
  backend: nccl
  placement_strategy: STRICT_PACK

examples:
  tinker_first_sft_training:
    steps: 15
    learning_rate: 0.0002
    max_grad_norm: 1.0
    max_length: 512
    sample_tokens: 200
    temperature: 0.7
    stop: []
    name: tinker-tinker-sft
    max_final_loss_ratio: 1.02
  tinker_first_rl_training:
    steps: 10
    batch_size: 4
    group_size: 4
    learning_rate: 0.00004
    max_tokens: 128
    temperature: 0.8
    name: tinker-tinker-rl
  qwen3_5_9b_rl_training:
    steps: 25
    batch_size: 2
    group_size: 4
    learning_rate: 0.00004
    max_tokens: 96
    temperature: 0.8
    top_p: 0.95
    exploration_temperature: 1.0
    exploration_top_p: 0.95
    min_train_datums: 1
    sft_anchor_weight: 0.2
    name: qwen3.5-9b-rl
    wandb:
      enabled: true
      project: ray-unsloth-rl
      name: qwen3.5-9b-2xl4-rl
      tags:
        - rl
        - qwen3.5
        - lora
        - 2xl4
        - model-sharded
      log_completions: 64

modal:
  enabled: true
  app_name: ray-unsloth
  gpu: L4:2
  timeout: 1800
  scaledown_window: 300
  volume_name: ray-unsloth-checkpoints
  volume_mount_path: /checkpoints
  python_version: "3.11"

checkpoint_root: /checkpoints
supported_models:
  - gemma4-e2b-it
  - lfm2.5-1.2b-instruct
  - qwen3.5-4b
  - qwen3.5-9b-instruct
