ray:
  address: null
  namespace: ray-unsloth
  ignore_reinit_error: true

model:
  config: qwen3.5-4b-ruler-64k

lora:
  rank: 8
  alpha: 8
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  random_state: 3407
  use_rslora: false
  bias: none
  use_gradient_checkpointing: unsloth
  loftq_config: null

model_configs:
  qwen3.5-4b-ruler-64k:
    model:
      base_model: Qwen/Qwen3.5-4B
      max_seq_length: 81920
      dtype: bfloat16
      load_in_4bit: false
      fast_inference: false
      gpu_memory_utilization: 0.90
      trust_remote_code: true
      attn_implementation: sdpa
    lora:
      rank: 8
      alpha: 8
      dropout: 0.0
      target_modules:
        - q_proj
        - k_proj
        - v_proj
        - o_proj
        - gate_proj
        - up_proj
        - down_proj
      random_state: 3407
      use_rslora: false
      bias: none
      use_gradient_checkpointing: unsloth
      loftq_config: null

resources:
  trainer_num_gpus: 0.0
  trainer_num_cpus: 0.25
  sampler_num_gpus: 0.0
  sampler_num_cpus: 0.25
  sampler_replicas: 1
  placement_strategy: PACK

distributed:
  enabled: false
  mode: null
  num_nodes: 1
  gpus_per_node: 1
  backend: nccl
  placement_strategy: STRICT_PACK

examples:
  qwen3_5_4b_ruler_64k_rl_training:
    dataset_name: tonychenxyz/ruler-full
    dataset_config: plain
    split: validation
    task: niah_single_1
    context_length: 65536
    dataset_limit: 16
    dataset_scan_limit: 40000
    min_prompt_tokens: 40000
    max_prompt_tokens: null
    steps: 20
    batch_size: 1
    group_size: 2
    learning_rate: 0.00002
    max_tokens: 4096
    max_train_tokens: 73728
    train_microbatch_size: 1
    temperature: 1.0
    top_p: 0.95
    top_k: 20
    max_time: 300.0
    min_train_datums: 1
    degenerate_reward_baseline: 0.0
    sft_anchor_weight: 0.0
    stop:
      - <|im_end|>
    name: qwen3.5-4b-ruler-64k-rl
    wandb:
      enabled: true
      project: ray-unsloth-rl
      name: qwen3.5-4b-ruler-64k-rl
      tags:
        - rl
        - qwen3.5
        - qwen3.5-4b
        - lora
        - ruler
        - 64k
        - long-context
      log_completions: 64

modal:
  enabled: true
  app_name: ray-unsloth
  gpu: A100-80GB
  timeout: 7200
  scaledown_window: 300
  volume_name: ray-unsloth-checkpoints
  volume_mount_path: /checkpoints
  python_version: "3.11"

checkpoint_root: /checkpoints
supported_models:
  - Qwen/Qwen3.5-4B
